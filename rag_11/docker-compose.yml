version: "3.8"

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_11_app
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RAG_INDEX=rag_index
      - GROQ_MODEL=openai/gpt-oss-120b
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./rag_index:/app/rag_index
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  rag_index:
  data:
